  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n\nfooter {\n  padding: 80px 56px 40px;\n  border-top: none;\n  max-width: 1400px;\n  margin: 0 auto;\n  background: transparent;\n  backdrop-filter: none;\n}\n\n.footer-grid {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  gap: 80px;\n  padding-bottom: 40px;\n  border-bottom: 1px solid rgba(255, 255, 255, 0.03);\n}\n\nfooter h3 {\n  font-family: \"Instrument Serif\", serif;\n  font-style: italic;\n  font-weight: 400;\n  font-size: 20px;\n  margin: 0 0 20px;\n  color: var(--white);\n}\n\nfooter h3 em {\n  font-style: normal;\n  font-family: \"Outfit\", sans-serif;\n}\n\nfooter p {\n  font-size: 13px;\n  line-height: 1.7;\n  color: var(--gray-light);\n  margin: 0;\n  max-width: 50ch;\n}\n\n.footer-links {\n  display: flex;\n  flex-direction: column;\n  gap: 12px;\n  text-align: right;\n  padding: 50px 0 50px 50px;\n}\n\nfooter a {\n  font-size: 13px;\n  color: var(--white);\n  transition: all 0.3s ease;\n  position: relative;\n  text-decoration: none;\n}\n\nfooter a::after {\n  content: '';\n  position: absolute;\n  bottom: -2px;\n  left: 0;\n  width: 0;\n  height: 1px;\n  background: var(--white);\n  transition: width 0.4s cubic-bezier(0.23, 1, 0.32, 1);\n}\n\nfooter a:hover::after { width: 100%; }\nfooter a:hover { color: var(--white); }\n\n.footer-copyright {\n  padding-top: 40px;\n  text-align: left;\n  font-size: 11px;\n  color: var(--gray-muted);\n}\n\n.footer-copyright em {\n  font-style: normal;\n  font-family: \"Outfit\", sans-serif;\n}\n\n.pricing-header {\n  text-align: center;\n  margin-bottom: 48px;\n}\n\n.pricing-section {\n  padding: 80px 56px;\n  max-width: 1400px;\n  margin: 0 auto;\n  background: transparent;\n  backdrop-filter: none;\n}\n\n@media (max-width: 768px) {\n  body {\n    padding-bottom: calc(120px + env(safe-area-inset-bottom));\n  }\n  \n  .hero {\n    padding-top: 100px;\n  }\n  \n  header {\n    padding: 20px 24px;\n  }\n  \n  header, section, footer {\n    padding-left: 24px;\n    padding-right: 24px;\n  }\n  \n  .services-grid {\n    grid-template-columns: 1fr;\n  }\n  \n  .form-row {\n    grid-template-columns: 1fr;\n  }\n  \n  .footer-grid {\n    grid-template-columns: 1fr;\n    gap: 40px;\n  }\n  \n  .footer-links {\n    text-align: left;\n    padding: 0;\n  }\n  \n  .footer-copyright {\n    padding-top: 32px;\n  }\n  \n  .timeline-item {\n    grid-template-columns: 1fr;\n    gap: 20px;\n  }\n  \n  nav {\n    gap: 20px;\n  }\n  \n  .hero h1 {\n    font-size: clamp(36px, 10vw, 56px);\n  }\n  \n  section h2 {\n    font-size: clamp(32px, 7vw, 48px);\n  }\n}\n\n@media (max-width: 480px) {\n  header {\n    padding: 16px 20px;\n  }\n  \n  .logo-container {\n    margin-left: 0;\n  }\n  \n  .logo-container img {\n    height: 32px;\n  }\n  \n  nav {\n    gap: 16px;\n  }\n  \n  nav a {\n    font-size: 11px;\n    letter-spacing: 0.04em;\n  }\n  \n  .card {\n    padding: 24px;\n  }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body style=\"background: linear-gradient(135deg, rgb(35, 35, 40), rgb(25, 25, 35)) fixed;\">\n\n<div id=\"gradient-bg\">\n  <div class=\"gradients-container\">\n    <div class=\"gradient-blob blob-1\"><\u002Fdiv>\n    <div class=\"gradient-blob blob-2\"><\u002Fdiv>\n    <div class=\"gradient-blob blob-3\"><\u002Fdiv>\n    <div class=\"gradient-blob blob-4\"><\u002Fdiv>\n    <div class=\"gradient-blob blob-5\"><\u002Fdiv>\n    <div class=\"pointer-interactive\" id=\"pointer-blob\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<header>\n  <div class=\"logo-container\">\n    <img src=\"logo-2mavi-white.svg\" alt=\"MAVI\" style=\"height: 40px; width: auto;\">\n  <\u002Fdiv>\n  <nav>\n    <a href=\"#services\" style=\"font-family: -apple-system\">trabalhos<\u002Fa>\n    <a href=\"#process\" style=\"font-family: -apple-system\">processo<\u002Fa>\n    <a href=\"#contact\">contato<\u002Fa>\n  <\u002Fnav>\n<\u002Fheader>\n\n<section class=\"hero\">\n  <h1>PRESENÇA DIGITAL QUE <span class=\"serif\">gera resultados<\u002Fspan> REAIS.<\u002Fh1>\n  <p class=\"hero-sub\">Landing pages de alta conversão, conteúdo estratégico para redes sociais e gerenciamento de presença digital completo. Arquitetura visual que vende e marca que permanece.<\u002Fp>\n  <button class=\"btn-primary\" onclick=\"document.getElementById('contact').scrollIntoView({behavior:'smooth'})\">INICIAR PROJETO →<\u002Fbutton>\n<\u002Fsection>\n\n<section class=\"manifesto\">\n  <h2>DESIGN COM <span class=\"serif\">intenção<\u002Fspan>. CÓDIGO COM <span class=\"serif\">resultado<\u002Fspan>.<\u002Fh2>\n  <p>No ambiente digital saturado de hoje, marcas que se destacam não deixam nada ao acaso. Cada pixel, cada palavra, cada interação é calculada para transformar curiosidade em ação. A <strong>MAVI<\u002Fstrong> projeta ecossistemas digitais que não apenas parecem sofisticados, eles <strong>vendem.<\u002Fstrong><\u002Fp>\n<\u002Fsection>\n\n<section id=\"services\">\n  <h2>O QUE FAZEMOS. COMO <span class=\"serif\">FUNCIONAMOS<\u002Fspan>.<\u002Fh2>\n  <div class=\"services-grid\">\n    <div class=\"card\">\n      <span class=\"label\">01 / Landing Pages<\u002Fspan>\n      <h3>MÁQUINAS DE CONVERSÃO<\u002Fh3>\n      <p>Landing pages ultra-velozes, responsivas e estrategicamente desenhadas para transformar visitantes em clientes. Código nativo, design exclusivo, resultados reais.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <span class=\"label\">02 / Conteúdo Social<\u002Fspan>\n      <h3>PRESENÇA QUE ENGAJA<\u002Fh3>\n      <p>Narrativas visuais estratégicas para Instagram, LinkedIn e TikTok. Conteúdo alinhado ao posicionamento único da sua marca que engaja e converte seguidores em clientes.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <span class=\"label\">03 / Gerenciamento<\u002Fspan>\n      <h3>OPERAÇÃO CONTÍNUA<\u002Fh3>\n      <p>Análise profunda e otimização constante. Presença ativa que gera impacto crescente. Sua marca sempre na vanguarda.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"process\">\n  <h2>NOSSO <span class=\"serif\">PROCESSO<\u002Fspan>.<\u002Fh2>\n  <div class=\"timeline-container\">\n    <div class=\"timeline-item\">\n      <div>\n        <div class=\"timeline-label\">Fase 01<\u002Fdiv>\n        <div class=\"timeline-title\">Diagnóstico<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"timeline-desc\">Análise profunda do seu mercado, concorrência e audiência. Mapeamos oportunidades estratégicas e definimos o posicionamento ideal para sua marca conquistar relevância no digital.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"timeline-item\">\n      <div>\n        <div class=\"timeline-label\">Fase 02<\u002Fdiv>\n        <div class=\"timeline-title\">Estratégia Visual<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"timeline-desc\">Criamos a identidade digital da sua marca. Layouts autorais, tipografia, paleta cromática e guidelines que garantem consistência digital. Design que comunica valor.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"timeline-item\">\n      <div>\n        <div class=\"timeline-label\">Fase 03<\u002Fdiv>\n        <div class=\"timeline-title\">Execução &amp; Otimização<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"timeline-desc\">Desenvolvemos com código nativo, otimizamos performance e testamos conversão. Cada detalhe é ajustado para máximo impacto. Seu projeto entra no ar como um ativo profissional e rentável.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"services-grid\" style=\"margin-top: 80px;\">\n    <div class=\"card\">\n      <h3>DESIGN AUTORIZADO<\u002Fh3>\n      <p>Layouts exclusivos criados do zero para sua marca. Sem templates genéricos. Cada projeto é uma solução única que reflete a essência do seu negócio.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <h3>PERFORMANCE BRUTAL<\u002Fh3>\n      <p>Velocidade excepcional, otimização de Core Web Vitals, conversão como prioridade. Seu site não apenas é bonito, é rápido, acessível e feito para vender.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <h3>PARCERIA ESTRATÉGICA<\u002Fh3>\n      <p>Não vendemos serviços. Construímos presença digital que move seu negócio para frente. Você não contrata agência, você ganha um time dedicado ao seu sucesso.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"pricing-section\">\n  <div class=\"pricing-header\">\n    <h2>O que nossos <span class=\"serif\">clientes<\u002Fspan> dizem<\u002Fh2>\n  <\u002Fdiv>\n  \n  <div class=\"testimonials-grid\">\n    <div class=\"testimonial-card in-view\">\n      <p class=\"testimonial-text\">\"A MAVI transformou completamente nossa presença digital. Em 3 meses, aumentamos em 300% o engajamento no Instagram. Profissionalismo do início ao fim.\"<\u002Fp>\n      <div class=\"testimonial-author\">\n        <div class=\"testimonial-avatar\">AC<\u002Fdiv>\n        <div>\n          <div class=\"testimonial-name\">Ana Carolina<\u002Fdiv>\n          <div class=\"testimonial-role\">CEO, Studio de Design<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"testimonial-card in-view\">\n      <p class=\"testimonial-text\">\"A landing page que criaram converteu 15% dos visitantes em clientes. Superou todas as expectativas. Entrega rápida e design impecável.\"<\u002Fp>\n      <div class=\"testimonial-author\">\n        <div class=\"testimonial-avatar\">MR<\u002Fdiv>\n        <div>\n          <div class=\"testimonial-name\">Marcelo Rocha<\u002Fdiv>\n          <div class=\"testimonial-role\">Diretor, Consultoria Digital<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"testimonial-card in-view\">\n      <p class=\"testimonial-text\">\"Finalmente uma agência que entende presença digital. Gerenciamento de posts impecável. Recomendo fortemente a todos os meus parceiros.\"<\u002Fp>\n      <div class=\"testimonial-author\">\n        <div class=\"testimonial-avatar\">JL<\u002Fdiv>\n        <div>\n          <div class=\"testimonial-name\">Juliana Lopes<\u002Fdiv>\n          <div class=\"testimonial-role\">Fundadora, E-commerce Premium<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"pricing-section\">\n  <div class=\"pricing-header\">\n    <h2>Dúvidas <span class=\"serif\">frequentes<\u002Fspan><\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"faq-container\">\n    <div class=\"faq-item\">\n      <div class=\"faq-question\" onclick=\"this.parentElement.classList.toggle('active')\">\n        <span>Qual é o prazo para entregar uma landing page?<\u002Fspan>\n        <span class=\"faq-toggle\">+<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"faq-answer\">\n        <p>O prazo para entrega de uma landing page é de até 5 dias úteis. Projetos com escopo maior ou requisitos complexos podem estender esse prazo. Definimos prazos específicos e realistas na proposta inicial.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"faq-item\">\n      <div class=\"faq-question\" onclick=\"this.parentElement.classList.toggle('active')\">\n        <span>Posso fazer alterações após a entrega?<\u002Fspan>\n        <span class=\"faq-toggle\">+<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"faq-answer\">\n        <p>Sim! Todos os serviços de Landing Page incluem até 2 revisões. Após isso, cobrámos uma taxa de €50 por revisão adicional. Alterações estruturais maiores são orçadas separadamente.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"faq-item\">\n      <div class=\"faq-question\" onclick=\"this.parentElement.classList.toggle('active')\">\n        <span>Como funciona o Acompanhamento Mensal?<\u002Fspan>\n        <span class=\"faq-toggle\">+<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"faq-answer\">\n        <p>Você recebe 4 feedbacks semanais sobre sua presença digital (análise de posts, sugestões de melhoria, relatório pontual). Também temos 1 reunião mensal para estratégia, além de suporte disponível para questões do cliente.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"faq-item\">\n      <div class=\"faq-question\" onclick=\"this.parentElement.classList.toggle('active')\">\n        <span>Vocês fazem campanhas pagas (Google Ads, Meta Ads)?<\u002Fspan>\n        <span class=\"faq-toggle\">+<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"faq-answer\">\n        <p>Não incluímos gestão de campanhas pagas nos pacotes atuais. Focamos em organic strategy e presença profissional. Podemos recomendar parceiros confiáveis para publicidade paga se necessário.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"faq-item\">\n      <div class=\"faq-question\" onclick=\"this.parentElement.classList.toggle('active')\">\n        <span>Qual é a forma de pagamento?<\u002Fspan>\n        <span class=\"faq-toggle\">+<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"faq-answer\">\n        <p>Aceitamos MBway, PayPal e cartão de crédito. Para serviços únicos (Landing Page, Análise), cobramos 50% no início e 50% na entrega. Para pacotes mensais, é cobrado no início de cada mês.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"form-section\" id=\"contact\">\n  <h2>PRONTO PARA CONSTRUIR SUA <span class=\"serif\">PRESENÇA<\u002Fspan>?<\u002Fh2>\n  <p>Deixe seu projeto conosco. Analisaremos em detalhes e responderemos com uma proposta estratégica.<\u002Fp>\n  <form class=\"form\" id=\"contact-form\" onsubmit=\"handleFormSubmit(event)\">\n    <div class=\"form-row\">\n      <div class=\"form-group\">\n        <label for=\"name\">Nome<\u002Flabel>\n        <input type=\"text\" id=\"name\" name=\"name\" placeholder=\"Seu nome completo\" required=\"\">\n      <\u002Fdiv>\n      <div class=\"form-group\">\n        <label for=\"email\">E-mail<\u002Flabel>\n        <input type=\"email\" id=\"email\" name=\"email\" placeholder=\"seu@email.com\" required=\"\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <div class=\"form-group\">\n        <label for=\"company\">Empresa<\u002Flabel>\n        <input type=\"text\" id=\"company\" name=\"company\" placeholder=\"Nome da sua empresa\" required=\"\">\n      <\u002Fdiv>\n      <div class=\"form-group\">\n        <label for=\"service\">O que você precisa?<\u002Flabel>\n        <select id=\"service\" name=\"service\" required=\"\">\n          <option value=\"\">Selecionar serviço...<\u002Foption>\n          <option value=\"landing\">Landing Page Premium<\u002Foption>\n          <option value=\"social\">Estratégia de Conteúdo Social<\u002Foption>\n          <option value=\"management\">Gerenciamento de Presença<\u002Foption>\n          <option value=\"complete\">Solução Completa (Tudo Junto)<\u002Foption>\n          <option value=\"other\">Outro<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row full\">\n      <div class=\"form-group\">\n        <label for=\"message\">Conte sobre seu projeto<\u002Flabel>\n        <textarea id=\"message\" name=\"message\" placeholder=\"Descreva seu objetivo, público-alvo, expectativas. Quanto mais detalhes, melhor nossa proposta.\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button type=\"submit\" class=\"form-submit\" id=\"submit-btn\">RECEBER PROPOSTA<\u002Fbutton>\n    <div id=\"form-status\" style=\"margin-top: 16px; font-size: 14px; text-align: center; display: none;\"><\u002Fdiv>\n  <\u002Fform>\n<\u002Fsection>\n\n<footer>\n  <div class=\"footer-grid\">\n    <div>\n      <h3 style=\"font-family: 'Outfit', sans-serif; font-style: normal; font-weight: 500; display: flex; align-items: center; gap: 10px;\"><img src=\"logo-mavi-footer.svg\" alt=\"mavi\" style=\"height: 22px; width: auto;\"> — digital group<\u002Fh3>\n      <p>Agência especializada em estratégia digital, design premium e presença que vende. Trabalhamos com marcas que entendem que qualidade é o único caminho para destaque no mercado saturado.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"footer-links\">\n      <a href=\"mailto:mavidigitalgroup@gmail.com\">mavidigitalgroup@gmail.com<\u002Fa>\n      <a href=\"https://mavidigital.pt\" target=\"_blank\">mavidigital.pt<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"footer-copyright\">© 2026 mavi — digital group. todos os direitos reservados.<\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n// ========== RESEND CONFIGURATION ==========\n// Substitua pela sua API key do Resend\nconst RESEND_API_KEY = 'sua_api_key_aqui'; // Você vai colar aqui depois\nconst SENDER_EMAIL = 'mavidigitalgroup@gmail.com'; // Email que envia\nconst RECEIVER_EMAIL = 'mavidigitalgroup@gmail.com'; // Seu email (recebe as submissões)\n\n// Handle form submission com Resend\nasync function handleFormSubmit(event) {\n  event.preventDefault();\n  \n  const form = event.target;\n  const submitBtn = document.getElementById('submit-btn');\n  const statusEl = document.getElementById('form-status');\n  \n  // Desabilita o botão\n  submitBtn.disabled = true;\n  submitBtn.textContent = 'Enviando...';\n  statusEl.style.display = 'block';\n  statusEl.textContent = 'Processando seu pedido...';\n  statusEl.style.color = '#888888';\n  \n  // Coleta dados\n  const formData = {\n    name: document.getElementById('name').value,\n    email: document.getElementById('email').value,\n    company: document.getElementById('company').value,\n    service: document.getElementById('service').value,\n    message: document.getElementById('message').value,\n    timestamp: new Date().toLocaleString('pt-BR')\n  };\n  \n  try {\n    // 1. Verifica se API key foi configurada\n    if (RESEND_API_KEY === 'sua_api_key_aqui') {\n      throw new Error('API key do Resend não configurada. Configure a chave no script.');\n    }\n    \n    // 2. Envia email para VOCÊ (admin)\n    const adminEmailResponse = await fetch('https://api.resend.com/emails', {\n      method: 'POST',\n      headers: {\n        'Authorization': `Bearer ${RESEND_API_KEY}`,\n        'Content-Type': 'application/json'\n      },\n      body: JSON.stringify({\n        from: `MAVI <${SENDER_EMAIL}>`,\n        to: RECEIVER_EMAIL,\n        subject: `Nova submissão de projeto - ${formData.name}`,\n        html: `\n          <div style=\"font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;\">\n            <h2 style=\"color: #000;\">Nova Submissão de Projeto<\u002Fh2>\n            <p><strong>Nome:<\u002Fstrong> ${formData.name}<\u002Fp>\n            <p><strong>Email:<\u002Fstrong> ${formData.email}<\u002Fp>\n            <p><strong>Empresa:<\u002Fstrong> ${formData.company}<\u002Fp>\n            <p><strong>Serviço Solicitado:<\u002Fstrong> ${getServiceLabel(formData.service)}<\u002Fp>\n            <p><strong>Mensagem:<\u002Fstrong><\u002Fp>\n            <p style=\"background-color: #f5f5f5; padding: 16px; border-radius: 8px;\">\n              ${formData.message.replace(/\\n/g, '<br>')}\n            <\u002Fp>\n            <p><strong>Data/Hora:<\u002Fstrong> ${formData.timestamp}<\u002Fp>\n            <hr style=\"margin: 20px 0; border: none; border-top: 1px solid #ddd;\">\n            <p style=\"color: #888; font-size: 12px;\">Responda para: ${formData.email}<\u002Fp>\n          <\u002Fdiv>\n        `\n      })\n    });\n    \n    if (!adminEmailResponse.ok) {\n      const errorData = await adminEmailResponse.json();\n      throw new Error(`Erro ao enviar email admin: ${errorData.message}`);\n    }\n    \n    // 3. Envia email de confirmação para o cliente\n    const clientEmailResponse = await fetch('https://api.resend.com/emails', {\n      method: 'POST',\n      headers: {\n        'Authorization': `Bearer ${RESEND_API_KEY}`,\n        'Content-Type': 'application/json'\n      },\n      body: JSON.stringify({\n        from: `MAVI <${SENDER_EMAIL}>`,\n        to: formData.email,\n        subject: 'Recebemos sua solicitação - MAVI Digital Group',\n        html: `\n          <div style=\"font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;\">\n            <h2 style=\"color: #000;\">Obrigado pela sua solicitação!<\u002Fh2>\n            <p>Olá <strong>${formData.name}<\u002Fstrong>,<\u002Fp>\n            <p>Recebemos sua submissão com sucesso. Nossa equipe analisará seu projeto e responderá com uma proposta estratégica em até 24 horas.<\u002Fp>\n            <div style=\"background-color: #f5f5f5; padding: 16px; border-radius: 8px; margin: 20px 0;\">\n              <p><strong>Resumo da sua solicitação:<\u002Fstrong><\u002Fp>\n              <p>Empresa: ${formData.company}<br>\n              Serviço: ${getServiceLabel(formData.service)}<br>\n              Contato: ${formData.email}<\u002Fp>\n            <\u002Fdiv>\n            <p>Enquanto isso, conheça mais sobre nossos serviços em <strong>mavidigital.pt<\u002Fstrong><\u002Fp>\n            <p>Abraços,<br><strong>MAVI — Digital Group<\u002Fstrong><\u002Fp>\n            <hr style=\"margin: 20px 0; border: none; border-top: 1px solid #ddd;\">\n            <p style=\"color: #888; font-size: 12px;\">Email: mavidigitalgroup@gmail.com<\u002Fp>\n          <\u002Fdiv>\n        `\n      })\n    });\n    \n    if (!clientEmailResponse.ok) {\n      const errorData = await clientEmailResponse.json();\n      throw new Error(`Erro ao enviar email cliente: ${errorData.message}`);\n    }\n    \n    // 4. Salva no localStorage como backup\n    let submissions = JSON.parse(localStorage.getItem('mavi_form_submissions') || '[]');\n    submissions.push(formData);\n    localStorage.setItem('mavi_form_submissions', JSON.stringify(submissions));\n    \n    // Sucesso!\n    statusEl.textContent = '✓ Proposta solicitada com sucesso! Verifique seu email.';\n    statusEl.style.color = '#4ade80';\n    form.reset();\n    submitBtn.textContent = 'RECEBER PROPOSTA';\n    submitBtn.disabled = false;\n    \n  } catch (error) {\n    console.error('Erro:', error);\n    statusEl.textContent = `✗ Erro: ${error.message}. Tente novamente.`;\n    statusEl.style.color = '#ff6b6b';\n    submitBtn.textContent = 'RECEBER PROPOSTA';\n    submitBtn.disabled = false;\n  }\n}\n\n// Helper: converte valor do select para label legível\nfunction getServiceLabel(value) {\n  const labels = {\n    'landing': 'Landing Page Premium',\n    'social': 'Estratégia de Conteúdo Social',\n    'management': 'Gerenciamento de Presença',\n    'complete': 'Solução Completa (Tudo Junto)',\n    'other': 'Outro'\n  };\n  return labels[value] || value;\n}\n\n// ========== RESTO DO SCRIPT (efeitos visuais) ==========\n\n// Header glassmorphism effect on scroll\nconst header = document.querySelector('header');\n\nwindow.addEventListener('scroll', () => {\n  const scrollPosition = window.scrollY;\n  \n  // Ativa o efeito quando user faz scroll > 20px\n  if (scrollPosition > 20) {\n    header.classList.add('header-active');\n  } else {\n    header.classList.remove('header-active');\n  }\n}, { passive: true });\n\n// Pointer interactive effect\nconst pointerBlob = document.getElementById('pointer-blob');\nif (pointerBlob) {\n  let curX = 0, curY = 0, tgX = 0, tgY = 0;\n  \n  document.addEventListener('mousemove', (e) => {\n    tgX = e.clientX;\n    tgY = e.clientY;\n  });\n  \n  function animate() {\n    curX += (tgX - curX) / 20;\n    curY += (tgY - curY) / 20;\n    pointerBlob.style.transform = `translate(${Math.round(curX)}px, ${Math.round(curY)}px)`;\n    requestAnimationFrame(animate);\n  }\n  \n  animate();\n}\n\n// Scroll-triggered reveal animations\nconst revealEls = document.querySelectorAll('.card, .timeline-item');\n\nfunction revealEl(el) {\n  const siblings = [...el.parentElement.children].filter(c =>\n    c.classList.contains('card') || c.classList.contains('timeline-item'));\n  const idx = siblings.indexOf(el);\n  el.style.transitionDelay = (idx * 0.1) + 's';\n  el.classList.add('in-view');\n}\n\nif ('IntersectionObserver' in window) {\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach((entry) => {\n      if (entry.isIntersecting) {\n        revealEl(entry.target);\n        observer.unobserve(entry.target);\n      }\n    });\n  }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });\n\n  revealEls.forEach(el => observer.observe(el));\n\n  setTimeout(() => {\n    revealEls.forEach(el => {\n      if (!el.classList.contains('in-view')) {\n        el.style.transitionDelay = '0s';\n        el.classList.add('in-view');\n      }\n    });\n  }, 3500);\n} else {\n  revealEls.forEach(el => el.classList.add('in-view'));\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"</script>
